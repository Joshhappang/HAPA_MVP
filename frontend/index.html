<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAPA MVP</title>

  <style>
    body{
      background:#0f1117;
      color:white;
      font-family:Arial;
      padding:30px;
    }

    h1{
      color:#00d2ff;
    }

    button{
      padding:12px 20px;
      background:#00d2ff;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
    }

    input{
      width:300px;
      padding:10px;
      margin-right:10px;
      border-radius:8px;
      border:none;
    }

    #output{
      margin-top:20px;
      padding:20px;
      background:#1b1f2a;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h1>HAPA MVP</h1>

<input id="prompt" placeholder="Generate UI...">
<button onclick="generateAI()">Generate</button>

<div id="output">
  Waiting...
</div>

<script>
async function generateAI(){

    const prompt = document.getElementById("prompt").value;

    const response = await fetch(
        "http://127.0.0.1:8000/ai/generate",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                prompt:prompt
            })
        }
    );

    const data = await response.json();

    document.getElementById("output").innerHTML =
        JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
